<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>支出一覧</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
	<h2 class="mb-4">支出一覧</h2>
	<div class="d-flex justify-content-between align-items-end mb-3">
		<form action="/expenses/summary" method="get" class="d-flex align-items-end gap-2">
			<div class="d-flex align-items-center gap-2">
				<label for="year">年:</label>
				<select name="year" id="year" class="form-select form-select-sm w-auto">
			    	<option value="2025">2025</option>
				</select>
			</div>
			<div class="d-flex align-items-center gap-2">
				<label for="month">月:</label>
				<select name="month" id="month" class="form-select form-select-sm w-auto">
					<option value="4">４</option>
				    <option value="5">５</option>
				</select>
			</div>
			<button type ="submit" class="btn btn-sm btn-primary">集計</button>
		</form>
		<form action="/expenses" method="get" class="d-flex align-items-end">
			<div class="d-flex align-items-center gap-2">
				<label for="sort">並び替え:</label>
				<select name="sort" id="sort" onchange="this.form.submit()" class="form-select form-select-sm w-auto">
					<option value="date_desc" th:selected="${sort == 'date_desc'}">日付（新しい順）</option>
					<option value="date_asc" th:selected="${sort == 'date_asc'}">日付（古い順）</option>
					<option value="amount_desc" th:selected="${sort == 'amount_desc'}">金額（高い順）</option>
					<option value="amount_asc" th:selected="${sort == 'amount_asc'}">金額（安い順）</option>
				</select>
			</div>
		</form>
	</div>
	<table class="table table-bordered">
		<thead class="table-dark">
		<tr>
			<th>カテゴリー</th>
			<th>内容</th>
			<th>金額</th>
			<th>日付</th>
			<th>支払方法</th>
			<th></th>
			<th></th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="expense : ${expenses.content}">
		    <td th:text="${expense.category}">カテゴリー</td>
			<td th:text="${expense.description}">内容</td>
			<td th:text="${expense.amount}">金額</td>
			<td th:text="${expense.date}">日付</td>
			<td th:text="${expense.payMethod}">支払方法</td>
			<td>
		    	<form th:action="@{'/expenses/' + ${expense.id} + '/delete'}" method="post">
				    <button type ="submit" class="btn btn-sm btn-danger" onclick="return confirm('本当に削除しますか？');">削除</button>
			    </form>
			</td>
			<td>
				<form th:action="@{'/expenses/' + ${expense.id} + '/edit'}" method="get">
				    <button type ="submit" class="btn btn-sm btn-secondary">編集</button>
				</form>
			</td>
		</tr>
		</tbody>
	</table>
	<nav class="mt-4">
		<ul class="pagination justify-content-center">
			<li class="page-item" th:classappend="${expenses.first} ? 'disabled'">
				<a class="page-link" th:href="@{/expenses(page=${expenses.number - 1}, sort=${sort})}">前へ</a>
			</li>
			<li class="page-item" th:each="i : ${#numbers.sequence(0, expenses.totalPages - 1)}"
			    th:classappend="${i == expenses.number} ? 'active'">
				<a class="page-link" th:href="@{/expenses(page=${i}, sort=${sort})}" th:text="${i + 1}">1</a>
			</li>
			<li class="page-item" th:classappend="${expenses.last} ? 'disabled'">
				<a class="page-link" th:href="@{/expenses(page=${expenses.number + 1}, sort=${sort})}">次へ</a>
			</li>
		</ul>
	</nav>
	<div class="mt-3">
		<h5>合計金額: <span th:text="${totalAmount} + ' 円'"></span></h5>
	</div>
	<a href="/expenses/new" class="mt-3 btn btn-primary">新規登録</a>
</div>
</body>
</html>
